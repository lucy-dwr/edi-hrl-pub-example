name: Check Repository Structure

# This workflow checks that all required folders and files are present.
# It runs as a plain shell script with no R installation required, so it
# is fast and works for both the script-first and {targets} approaches.
#
# To adapt this for your own repository: update the REQUIRED_FOLDERS and
# REQUIRED_FILES lists below to match your dataset and folder layout.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required folders and files
        run: |
          echo "Checking for required folders and files..."

          # -----------------------------------------------------------------------
          # Required folders — update to match your repository structure
          # -----------------------------------------------------------------------
          REQUIRED_FOLDERS=(
            "data/raw"
            "data/clean"
            "ingest"
            "clean"
            "qc"
            "publish"
            "publish/metadata_templates"
            "publish/metadata_templates/attributes_csv_template"
            "publish/metadata_templates/personnel_csv_template"
            "publish/eml"
            "scripts"
          )

          # -----------------------------------------------------------------------
          # Required files — update to match your dataset and metadata templates
          # -----------------------------------------------------------------------
          REQUIRED_FILES=(
            # Pipeline runner scripts (shared by both script-first and targets approaches)
            "ingest/ingest.R"
            "clean/clean.R"
            "qc/qc.R"
            "publish/publish.R"
            "scripts/run_pipeline.R"
            "_targets.R"

            # Tutorial example scripts
            "ingest/read-data-cdec.R"
            "clean/clean-microhabitat-observations.R"
            "qc/qc-microhabitat-observations.R"
            "publish/make-eml.R"

            # Raw data (manually maintained; not regenerable from code)
            "data/raw/microhabitat_observations_raw.csv"

            # Metadata templates
            "publish/metadata_templates/abstract.txt"
            "publish/metadata_templates/keywords.txt"
            "publish/metadata_templates/methods.docx"
            "publish/metadata_templates/intellectual_rights.txt"
            "publish/metadata_templates/geographic_coverage.txt"
            "publish/metadata_templates/taxonomic_coverage.txt"
            "publish/metadata_templates/custom_units.txt"
            "publish/metadata_templates/attributes_csv_template/attributes_microhabitat_observations.csv"
            "publish/metadata_templates/personnel_csv_template/personnel.csv"
          )

          ERRORS=0

          echo ""
          echo "=== Checking Folders ==="
          for folder in "${REQUIRED_FOLDERS[@]}"; do
            if [ -d "$folder" ]; then
              echo "✓ Found: $folder"
            else
              echo "✗ Missing: $folder"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          echo "=== Checking Files ==="
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ Found: $file"
            else
              echo "✗ Missing: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [ $ERRORS -eq 0 ]; then
            echo "✓ All required folders and files are present!"
            exit 0
          else
            echo "✗ $ERRORS required folder(s) or file(s) are missing!"
            exit 1
          fi
