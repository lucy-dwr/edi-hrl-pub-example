name: Check Repository Structure

# This workflow checks that all required folders and files are present.
# It runs as a plain shell script with no R installation required, so it
# is fast and works for both the script-first and {targets} approaches.
#
# To adapt this for your own repository: update the REQUIRED_FILES lists below
# to match your dataset layout.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Reusable workflow from the template repository
  check-structure-standard:
    uses: FlowWest/hrl-edi-template/.github/workflows/check-required-structure.yml@main

  # Check for files unique to this repository - update to match your repository
  check-structure-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required folders and files
        run: |
          echo "Checking for required files..."

          # -----------------------------------------------------------------------
          # Required files — update to match your dataset and metadata templates
          # -----------------------------------------------------------------------
          # Metadata are already checked in the standard workflow

          REQUIRED_FILES=(
            # Pipeline runner scripts (shared by both script-first and targets approaches)
            "ingest/ingest.R"
            "clean/clean.R"
            "qc/qc.R"
            "publish/publish.R"
            "scripts/run_pipeline.R"
            "_targets.R"

            # Tutorial example scripts
            "ingest/read-data-cdec.R"
            "clean/clean-microhabitat-observations.R"
            "qc/qc-microhabitat-observations.R"
            "publish/make-eml.R"

            # Raw data (manually maintained; not regenerable from code)
            "data/raw/microhabitat_observations_raw.csv"
          )

          ERRORS=0

          echo ""
          echo "=== Checking Files ==="
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ Found: $file"
            else
              echo "✗ Missing: $file"
              ERRORS=$((ERRORS + 1))
            fi
          done

          echo ""
          if [ $ERRORS -eq 0 ]; then
            echo "✓ All required files are present!"
            exit 0
          else
            echo "✗ $ERRORS required file(s) are missing!"
            exit 1
          fi
