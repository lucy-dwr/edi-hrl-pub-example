name: Test Pipeline (Targets)

# This workflow verifies that the pipeline runs without error using the
# {targets} approach (targets::tar_make()).
#
# Ingest is idempotent: because the raw data files are committed to the
# repository, run_ingest() skips the CDEC API download and returns the
# existing file paths. No external API access is needed.
# Publish is a no-op by default (generate_eml = FALSE, publish = FALSE)
# and requires no credentials.
#
# To adapt this for your own repository:
#   - Update the package installation step to include any packages your
#     pipeline requires beyond the ones listed here.
#   - If your hrlpub fork is private, add a GITHUB_PAT repository secret
#     and pass it to remotes::install_github().

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-pipeline-targets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install R packages
        run: |
          install.packages(c(
            'remotes', 'targets', 'testthat', 'here',
            'readr', 'dplyr', 'lubridate', 'stringr', 'tibble'
          ))
          remotes::install_github('FlowWest/hrlpub')
        shell: Rscript {0}

      - name: Run pipeline with targets
        run: |
          targets::tar_make()
        shell: Rscript {0}

      - name: Run data quality tests
        run: |
          testthat::test_dir("tests/testthat")
        shell: Rscript {0}
