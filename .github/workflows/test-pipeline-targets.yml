name: Test Pipeline (Targets)

# This workflow verifies that the pipeline runs without error using the
# {targets} approach (targets::tar_make()).
#
# Ingest is idempotent: because the raw data files are committed to the
# repository, run_ingest() skips the CDEC API download and returns the
# existing file paths. No external API access is needed.
# Publish is a no-op by default (generate_eml = FALSE, publish = FALSE)
# and requires no credentials.
#
# To adapt this for your own repository:
#   - Package dependencies are managed by renv. Update renv.lock in your repo
#     and the workflow will automatically install the correct versions.
#   - The GITHUB_TOKEN is passed to renv::restore() to avoid GitHub API rate
#     limits when restoring GitHub-sourced packages (e.g. hrlpub). If your
#     fork of hrlpub is private, replace GITHUB_TOKEN with a personal access
#     token stored as a GITHUB_PAT repository secret.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-pipeline-targets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pipeline with targets
        run: |
          targets::tar_make()
        shell: Rscript {0}

      - name: Test EML generation
        run: |
          source("publish/make-eml.R")
        shell: Rscript {0}
