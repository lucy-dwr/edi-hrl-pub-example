name: Test Pipeline (Script Runner)

# This workflow verifies that the clean and QC pipeline stages run without
# error using the simple script-first approach (scripts/run_pipeline.R).
#
# Ingest is skipped because it requires external API access. Publish is
# skipped because it requires EDI credentials. Both stages use committed
# data in data/raw/ and data/clean/ to run entirely offline.
#
# To adapt this for your own repository:
#   - Package dependencies are managed by renv. Update renv.lock in your repo
#     and the workflow will automatically install the correct versions.
#   - The GITHUB_TOKEN is passed to renv::restore() to avoid GitHub API rate
#     limits when restoring GitHub-sourced packages (e.g. hrlpub). If your
#     fork of hrlpub is private, replace GITHUB_TOKEN with a personal access
#     token stored as a GITHUB_PAT repository secret.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-pipeline-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libglpk-dev \
            libjq-dev \
            libnode-dev \
            libx11-dev \
            pandoc

      - name: Restore renv environment
        uses: r-lib/actions/setup-renv@v2
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Run clean and QC stages
        run: |
          Rscript scripts/run_pipeline.R --skip-ingest --skip-publish

      - name: Test EML generation
        run: |
          source("publish/make-eml.R")
        shell: Rscript {0}
